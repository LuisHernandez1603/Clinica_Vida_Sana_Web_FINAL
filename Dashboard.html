<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Admin</title>
  <link rel="stylesheet" href="Dashboard.css" />
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar lateral -->
    <aside class="sidebar">
      <h2 class="sidebar__title">Clínica Vida Sana</h2>
      <nav class="sidebar__nav">
        <ul class="sidebar__list">
          <li class="sidebar__item sidebar__item--active">Inicio</li>
          <li class="sidebar__item">Pacientes</li>
          <li class="sidebar__item">Doctores</li>
          <li class="sidebar__item">Citas</li>
          <li class="sidebar__item">Reportes</li>
        </ul>
      </nav>
    </aside>

    <!-- Contenido principal -->
    <main class="dashboard">
      <h1 class="dashboard__titulo">Dashboard-ClinicaVidaSana</h1>

      <section class="dashboard__seccion">
        <h2 class="dashboard__subtitulo">Pacientes Registrados por Mes</h2>
        <table class="dashboard__tabla tabla--pacientes">
          <thead>
            <tr>
              <th>Mes</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="tabla-pacientes-body"></tbody>
        </table>
        <canvas id="grafico-pacientes" class="dashboard__grafico"></canvas>
      </section>

      <section class="dashboard__seccion">
        <h2 class="dashboard__subtitulo">Citas Atendidas por Mes</h2>
        <table class="dashboard__tabla tabla--citas">
          <thead>
            <tr>
              <th>Mes</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="tabla-citas-body"></tbody>
        </table>
        <canvas id="grafico-citas" class="dashboard__grafico"></canvas>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="Dashboard.js"></script>
</body>
</html>
