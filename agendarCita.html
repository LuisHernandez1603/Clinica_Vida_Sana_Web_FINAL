<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Cita - Paciente</title>
  <link rel="stylesheet" href="agendarCita.css" />
</head>
<body>
  <section class="agendar-cita">
    <!-- Título del formulario -->
    <h2 class="agendar-cita__titulo">Agendar Cita</h2>

    <!-- Mensaje de éxito o error -->
    <div class="agendar-cita__mensaje" id="mensaje-agendar">
      <span id="mensaje-texto-agendar"></span>
    </div>

    <!-- Formulario para agendar cita -->
    <form class="agendar-cita__form" id="form-agendar-cita" action="#" method="POST">
      <!-- Correo electrónico -->
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="correo">Correo Electrónico</label>
        <input
          class="agendar-cita__input"
          type="email"
          id="correo"
          name="correo"
          maxlength="50"
          required
          placeholder="correo@ejemplo.com"
        />
      </div>

      <!-- Fecha de la cita -->
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="fecha">Fecha</label>
        <input
          class="agendar-cita__input"
          type="date"
          id="fecha"
          name="fecha"
          required
          min=""
        />
      </div>

      <!-- Hora de la cita -->
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="hora">Hora</label>
        <input
          class="agendar-cita__input"
          type="time"
          id="hora"
          name="hora"
          required
          min="08:00"
          max="17:00"
        />
      </div>

      <!-- Motivo de la cita -->
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="motivo">Motivo</label>
        <textarea
          class="agendar-cita__input"
          id="motivo"
          name="motivo"
          rows="3"
          maxlength="200"
          placeholder="Describa brevemente el motivo"
          required
        ></textarea>
      </div>

      <!-- Botón para enviar el formulario -->
      <button class="agendar-cita__boton" type="submit">Agendar</button>
    </form>
  </section>

  <script src="agendarCita.js"></script>
</body>
</html>
