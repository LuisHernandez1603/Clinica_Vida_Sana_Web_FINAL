<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Cita - Paciente</title>
  <link rel="stylesheet" href="agendarCita.css" />
</head>
<body>
  <section class="agendar-cita">
    <h2 class="agendar-cita__titulo">Agendar Cita</h2>

    <div class="agendar-cita__mensaje" id="mensaje-agendar" style="display:none;">
      <span id="mensaje-texto-agendar"></span>
    </div>

    <form class="agendar-cita__form" id="form-agendar-cita" action="#" method="POST">
      
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="correo">Correo Electrónico del Paciente</label>
        <input
          class="agendar-cita__input"
          type="email"
          id="correo"
          name="correo"
          maxlength="50"
          required
          placeholder="correo@ejemplo.com"
        />
        <button type="button" id="btn-buscar-paciente" class="agendar-cita__boton-buscar">Buscar Paciente</button>
        <p class="agendar-cita__info" id="info-paciente"></p>
        <input type="hidden" id="paciente_id" name="paciente_id" />
      </div>

      <!-- Agrego solo este bloque para fecha -->
      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="fecha">Fecha</label>
        <input
          class="agendar-cita__input"
          type="date"
          id="fecha"
          name="fecha"
          required
          min="<?php echo date('Y-m-d'); ?>"
        />
      </div>

      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="hora">Hora</label>
        <input
          class="agendar-cita__input"
          type="time"
          id="hora"
          name="hora"
          required
          min="08:00"
          max="17:00"
        />
      </div>

      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="doctor">Doctor</label>
        <select
          class="agendar-cita__input"
          id="doctor"
          name="doctor"
          required
        >
          <option value="">Seleccione un doctor</option>
          <!-- Opciones se llenan dinámicamente -->
        </select>
      </div>

      <div class="agendar-cita__grupo">
        <label class="agendar-cita__label" for="motivo">Motivo</label>
        <textarea
          class="agendar-cita__input"
          id="motivo"
          name="motivo"
          rows="3"
          maxlength="200"
          placeholder="Describa brevemente el motivo"
          required
        ></textarea>
      </div>

      <button class="agendar-cita__boton" type="submit">Agendar</button>
    </form>
  </section>

  <script src="agendarCita.js"></script>
</body>
</html>
