<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="Login.css" />
</head>
<body class="login">

  <section class="login__container">
    <h1 class="login__title">Bienvenido</h1>

    <form class="login__form">
      <label class="login__label" for="email">Correo electrónico</label>
      <input class="login__input" type="email" id="email" placeholder="ejemplo@correo.com" required />

      <label class="login__label" for="password">Contraseña</label>
      <input class="login__input" type="password" id="password" placeholder="••••••••" required />

      <button class="login__button" type="submit">Iniciar sesión</button>
    </form>

    <p class="login__register">
      ¿No tenés cuenta? <a href="CrearCuenta.html" class="login__link">Registrarse</a>
    </p>
  </section>

</body>
</html>
