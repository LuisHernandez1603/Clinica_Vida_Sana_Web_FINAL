<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración de codificación y vista -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>

  <!-- Enlace al archivo de estilos CSS específico del login -->
  <link rel="stylesheet" href="Login.css" />
</head>
<body class="login">

  <!-- Contenedor principal del login -->
  <section class="login__container">
    
    <!-- Título de bienvenida -->
    <h1 class="login__title">Bienvenido</h1>

    <!-- Formulario de inicio de sesión -->
    <form class="login__form" id="loginForm">
      
      <!-- Campo de usuario -->
      <label class="login__label" for="username">Usuario</label>
      <input class="login__input" type="text" id="username" placeholder="Tu usuario" required />

      <!-- Campo de contraseña -->
      <label class="login__label" for="password">Contraseña</label>
      <input class="login__input" type="password" id="password" placeholder="••••••••" required />

      <!-- Botón para enviar el formulario -->
      <button class="login__button" type="submit">Iniciar sesión</button>
    </form>

    <!-- Enlace para registrarse si no tiene cuenta -->
    <p class="login__register">
      ¿No tenés cuenta? 
      <a href="CrearCuenta.html" class="login__link">Registrarse</a>
    </p>
  </section>

  <!-- Script JS para lógica del login -->
  <script src="login.js"></script>
</body>
</html>
