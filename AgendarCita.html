<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Cita</title>
  <link rel="stylesheet" href="AgendarCita.css" />
</head>
<body>

<section class="agendar-cita">

  <h2 class="agendar-cita__titulo">Agendar Cita</h2>

  <div class="agendar-cita__mensaje" id="mensaje-exito" style="display:none;">
    <span class="agendar-cita__icono">✔</span>
    <span id="mensaje-texto"></span>
  </div>

  <form id="form-cita" class="agendar-cita__form" action="#" method="POST">

     <!-- Grupo para campo correo -->
    <div class="agendar-cita__grupo">
      <label class="agendar-cita__label" for="correo">Correo</label>
      <input
        class="agendar-cita__input"
        type="text"
        id="correo"
        name="correo"
        maxlength="50"
        required
      />
    </div>

    <div class="agendar-cita__grupo">
      <label class="agendar-cita__label" for="fechaCita">Fecha de la Cita</label>
      <input
        class="agendar-cita__input"
        type="date"
        id="fechaCita"
        name="fechaCita"
        required
      />
    </div>

    <div class="agendar-cita__grupo">
      <label class="agendar-cita__label" for="horaCita">Hora de la Cita</label>
      <input
        class="agendar-cita__input"
        type="time"
        id="horaCita"
        name="horaCita"
        required
      />
    </div>

    <div class="agendar-cita__grupo">
      <label class="agendar-cita__label" for="motivo">Motivo</label>
      <textarea
        class="agendar-cita__input"
        id="motivo"
        name="motivo"
        maxlength="255"
        placeholder="Describa el motivo de la cita"
        required
      ></textarea>
    </div>

    <button class="agendar-cita__boton" type="submit">Agendar</button>

  </form>

</section>

<script src="agendarcita.js"></script>

</body>
</html>
