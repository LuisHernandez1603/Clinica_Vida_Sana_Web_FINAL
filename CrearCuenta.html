<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Usuario - Clínica Vida Sana</title>
  <link rel="stylesheet" href="CrearCuenta.css" />
</head>
<body>

  <!-- Sección principal del formulario de registro de usuario -->
  <section class="registro-usuario">
    
    <!-- Título -->
    <h2 class="registro-usuario__titulo">Registrar Usuario</h2>

    <!-- Formulario registro -->
    <form class="registro-usuario__form" id="form-registro">
      
      <!-- Nombre de usuario -->
      <div class="registro-usuario__grupo">
        <label class="registro-usuario__label" for="username">Nombre de usuario</label>
        <input class="registro-usuario__input" type="text" id="username" name="username" required />
      </div>

      <!-- Contraseña -->
      <div class="registro-usuario__grupo">
        <label class="registro-usuario__label" for="password">Contraseña</label>
        <input class="registro-usuario__input" type="password" id="password" name="password" required />
      </div>

      <!-- Confirmar contraseña -->
      <div class="registro-usuario__grupo">
        <label class="registro-usuario__label" for="confirm-password">Confirmar contraseña</label>
        <input class="registro-usuario__input" type="password" id="confirm-password" name="confirm_password" required />
      </div>

      <!-- Botón enviar -->
      <button class="registro-usuario__boton" type="submit">Registrar</button>
    </form>
  </section>

  <script src="crearCuenta.js"></script>
</body>
</html>
