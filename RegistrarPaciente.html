<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar Paciente</title>
  <link rel="stylesheet" href="RegistrarPaciente.css" />
</head>
<body>

<section class="registro-paciente">
  <h2 class="registro-paciente__titulo">Registrar Paciente</h2>

  <form id="form-paciente" class="registro-paciente__form" action="#" method="POST">
    <div class="registro-paciente__grupo">
      <label class="registro-paciente__label" for="nombre">Nombre</label>
      <input class="registro-paciente__input" type="text" id="nombre" name="nombre" maxlength="50" required />
    </div>

    <div class="registro-paciente__grupo">
      <label class="registro-paciente__label" for="apellido">Apellido</label>
      <input class="registro-paciente__input" type="text" id="apellido" name="apellido" maxlength="50" required />
    </div>

    <div class="registro-paciente__grupo">
      <label class="registro-paciente__label" for="genero">Género</label>
      <select class="registro-paciente__input" id="genero" name="genero" required>
        <option value="">Seleccione</option>
        <option value="Masculino">Masculino</option>
        <option value="Femenino">Femenino</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="registro-paciente__grupo">
      <label class="registro-paciente__label" for="edad">Edad</label>
      <input class="registro-paciente__input" type="number" id="edad" name="edad" min="0" required />
    </div>

    <button class="registro-paciente__boton" type="submit">Registrar</button>
  </form>
</section>

<script>
  const form = document.getElementById('form-paciente');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const genero = document.getElementById('genero').value;
    const edad = parseInt(document.getElementById('edad').value, 10);

    if (!nombre || !apellido || !genero || !edad) {
      alert('Por favor, completa todos los campos.');
      return;
    }

    try {
      const response = await fetch('http://localhost:3000/registrar-paciente', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, apellido, genero, edad })
      });

      if (response.ok) {
        const data = await response.json();
        alert(data.mensaje);
        form.reset();
      } else {
        const errorData = await response.json();
        alert('Error al registrar paciente: ' + (errorData.error || 'Error desconocido'));
      }
    } catch (error) {
      alert('Error al conectar con el servidor');
      console.error(error);
    }
  });
</script>

</body>
</html>
